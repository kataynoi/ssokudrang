version: '3.8'

services:
  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: ssokudrang_nginx
    ports:
      - "8085:80"
    volumes:
      - ./ssokudrang:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - mysql
    networks:
      - ssokudrang_network

  # PHP Service
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssokudrang_php
    volumes:
      - ./ssokudrang:/var/www/html
      - ./.env:/var/www/.env:ro
    depends_on:
      - mysql
    networks:
      - ssokudrang_network

  # MySQL Service
  mysql:
    image: mysql:5.7
    container_name: ssokudrang_mysql
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: dd0648282939DD
      MYSQL_DATABASE: ssokudrang
      MYSQL_USER: dechachit
      MYSQL_PASSWORD: dd0648282939DD
    volumes:
      - mysql_data:/var/lib/mysql
      - ./ssokudrang.sql:/docker-entrypoint-initdb.d/ssokudrang.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - ssokudrang_network

  # phpMyAdmin Service (Optional - for database management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ssokudrang_phpmyadmin
    ports:
      - "8086:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: dd0648282939DD
    depends_on:
      - mysql
    networks:
      - ssokudrang_network

networks:
  ssokudrang_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
