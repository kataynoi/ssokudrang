version: '3.8'

services:
  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: ssokudrang_nginx
    ports:
      - "${NGINX_PORT:-8085}:80"
    volumes:
      - ./ssokudrang:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    restart: unless-stopped
    networks:
      - ssokudrang_network

  # PHP Service
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssokudrang_php
    volumes:
      - ./ssokudrang:/var/www/html
      - ./.env:/var/www/.env:ro
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - ssokudrang_network

  # MySQL Service
  mysql:
    image: mysql:5.7
    container_name: ssokudrang_mysql
    ports:
      - "${MYSQL_PORT:-3310}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./ssokudrang.sql:/docker-entrypoint-initdb.d/ssokudrang.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    networks:
      - ssokudrang_network

  # phpMyAdmin Service (Optional - for database management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ssokudrang_phpmyadmin
    ports:
      - "${PHPMYADMIN_PORT:-8086}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - ssokudrang_network

networks:
  ssokudrang_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
